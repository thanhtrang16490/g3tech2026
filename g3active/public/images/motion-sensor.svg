<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Background -->
  <rect width="400" height="400" fill="#f8fafc"/>
  
  <!-- Sensor body -->
  <rect x="140" y="120" width="120" height="160" rx="60" fill="#1e293b" stroke="#334155" stroke-width="4"/>
  <rect x="150" y="130" width="100" height="140" rx="50" fill="#0f172a"/>
  
  <!-- Sensor indicator -->
  <circle cx="200" cy="190" r="30" fill="#3b82f6" opacity="0.3"/>
  <circle cx="200" cy="190" r="20" fill="#3b82f6" opacity="0.5"/>
  <circle cx="200" cy="190" r="10" fill="#3b82f6"/>
  
  <!-- Motion waves -->
  <path d="M230 190 Q250 190 260 180" stroke="#60a5fa" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M230 190 Q250 190 260 200" stroke="#60a5fa" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M245 190 Q265 190 275 175" stroke="#60a5fa" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M245 190 Q265 190 275 205" stroke="#60a5fa" stroke-width="3" stroke-linecap="round" fill="none"/>
  
  <!-- Brand text -->
  <text x="200" y="340" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1e293b" text-anchor="middle">Motion Sensor</text>
  <text x="200" y="365" font-family="Arial, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Aqara P1</text>
</svg>
