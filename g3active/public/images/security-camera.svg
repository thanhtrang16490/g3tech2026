<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Background -->
  <rect width="400" height="400" fill="#f8fafc"/>
  
  <!-- Camera body -->
  <ellipse cx="200" cy="200" rx="100" ry="100" fill="#1e293b" stroke="#334155" stroke-width="4"/>
  <ellipse cx="200" cy="200" rx="90" ry="90" fill="#0f172a"/>
  
  <!-- Lens -->
  <circle cx="200" cy="200" r="50" fill="#1e293b" stroke="#475569" stroke-width="4"/>
  <circle cx="200" cy="200" r="35" fill="#0f172a"/>
  <circle cx="200" cy="200" r="20" fill="#3b82f6"/>
  <circle cx="200" cy="200" r="10" fill="#1e40af"/>
  
  <!-- IR LEDs -->
  <circle cx="150" cy="150" r="5" fill="#ef4444"/>
  <circle cx="250" cy="150" r="5" fill="#ef4444"/>
  <circle cx="150" cy="250" r="5" fill="#ef4444"/>
  <circle cx="250" cy="250" r="5" fill="#ef4444"/>
  
  <!-- Brand text -->
  <text x="200" y="340" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1e293b" text-anchor="middle">Security Camera</text>
  <text x="200" y="365" font-family="Arial, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">EZVIZ C6N</text>
</svg>
