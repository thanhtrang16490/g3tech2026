<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Background -->
  <rect width="400" height="400" fill="#f8fafc"/>
  
  <!-- Speaker body -->
  <rect x="130" y="120" width="140" height="160" rx="70" fill="#1e293b" stroke="#334155" stroke-width="4"/>
  <rect x="140" y="130" width="120" height="140" rx="60" fill="#0f172a"/>
  
  <!-- Speaker cone -->
  <circle cx="200" cy="190" r="40" fill="#1e293b" stroke="#475569" stroke-width="3"/>
  <circle cx="200" cy="190" r="25" fill="#0f172a"/>
  <circle cx="200" cy="190" r="15" fill="#3b82f6"/>
  
  <!-- Sound waves -->
  <path d="M270 170 Q290 190 270 210" stroke="#60a5fa" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M285 160 Q310 190 285 220" stroke="#60a5fa" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M300 150 Q330 190 300 230" stroke="#60a5fa" stroke-width="3" stroke-linecap="round" fill="none"/>
  
  <!-- LED ring -->
  <circle cx="200" cy="145" r="8" fill="#10b981"/>
  
  <!-- Brand text -->
  <text x="200" y="340" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1e293b" text-anchor="middle">Smart Speaker</text>
  <text x="200" y="365" font-family="Arial, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Xiaomi AI</text>
</svg>
