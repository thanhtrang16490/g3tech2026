<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Background -->
  <rect width="400" height="400" fill="#f8fafc"/>
  
  <!-- Curtain rail -->
  <rect x="80" y="80" width="240" height="20" rx="10" fill="#1e293b" stroke="#334155" stroke-width="4"/>
  
  <!-- Curtain tracks -->
  <rect x="90" y="100" width="4" height="200" fill="#cbd5e1"/>
  <rect x="306" y="100" width="4" height="200" fill="#cbd5e1"/>
  
  <!-- Curtain fabric left -->
  <rect x="94" y="100" width="100" height="200" fill="#3b82f6" opacity="0.8"/>
  <rect x="94" y="100" width="100" height="200" fill="url(#curtain-gradient-left)"/>
  
  <!-- Curtain fabric right -->
  <rect x="206" y="100" width="100" height="200" fill="#3b82f6" opacity="0.8"/>
  <rect x="206" y="100" width="100" height="200" fill="url(#curtain-gradient-right)"/>
  
  <!-- Motor -->
  <rect x="280" y="75" width="40" height="30" rx="5" fill="#1e293b" stroke="#334155" stroke-width="3"/>
  <circle cx="300" cy="90" r="5" fill="#10b981"/>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="curtain-gradient-left" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="curtain-gradient-right" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1d4ed8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  
  <!-- Brand text -->
  <text x="200" y="340" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1e293b" text-anchor="middle">Smart Curtain</text>
  <text x="200" y="365" font-family="Arial, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Aqara B1</text>
</svg>
