<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Background -->
  <rect width="400" height="400" fill="#f8fafc"/>
  
  <!-- Generic product box -->
  <rect x="100" y="120" width="200" height="160" rx="20" fill="#1e293b" stroke="#334155" stroke-width="4"/>
  <rect x="110" y="130" width="180" height="140" rx="15" fill="#0f172a"/>
  
  <!-- Product icon -->
  <circle cx="200" cy="190" r="40" fill="#3b82f6" opacity="0.3"/>
  <circle cx="200" cy="190" r="25" fill="#3b82f6" opacity="0.5"/>
  <circle cx="200" cy="190" r="15" fill="#3b82f6"/>
  
  <!-- WiFi symbol -->
  <path d="M200 100 Q200 80 215 70" stroke="#60a5fa" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M185 105 Q185 85 200 75" stroke="#60a5fa" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M215 105 Q215 85 200 75" stroke="#60a5fa" stroke-width="4" stroke-linecap="round" fill="none"/>
  
  <!-- Brand text -->
  <text x="200" y="340" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1e293b" text-anchor="middle">Smart Device</text>
  <text x="200" y="365" font-family="Arial, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">G3BOX</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Background -->
  <rect width="400" height="400" fill="#f3f4f6"/>
  
  <!-- Product silhouette -->
  <rect x="100" y="120" width="200" height="160" rx="20" fill="#e5e7eb"/>
  <rect x="120" y="140" width="160" height="100" rx="10" fill="#d1d5db"/>
  
  <!-- Screen/content lines -->
  <rect x="140" y="160" width="120" height="8" rx="4" fill="#9ca3af"/>
  <rect x="140" y="180" width="80" height="8" rx="4" fill="#9ca3af"/>
  <rect x="140" y="200" width="100" height="8" rx="4" fill="#9ca3af"/>
  
  <!-- Base/stand -->
  <rect x="170" y="280" width="60" height="40" rx="5" fill="#d1d5db"/>
  <rect x="150" y="320" width="100" height="10" rx="5" fill="#e5e7eb"/>
  
  <!-- Smart home icon -->
  <circle cx="200" cy="80" r="30" fill="#3b82f6" opacity="0.2"/>
  <path d="M200 65 L215 80 L215 95 L185 95 L185 80 Z" fill="#3b82f6"/>
  <rect x="195" y="85" width="10" height="10" fill="white"/>
  
  <!-- WiFi waves -->
  <path d="M190 50 Q200 40 210 50" stroke="#3b82f6" stroke-width="2" fill="none"/>
  <path d="M185 45 Q200 30 215 45" stroke="#3b82f6" stroke-width="2" fill="none"/>
  <path d="M180 40 Q200 20 220 40" stroke="#3b82f6" stroke-width="2" fill="none"/>
  
  <!-- Text -->
  <text x="200" y="365" font-family="Arial" font-size="16" fill="#6b7280" text-anchor="middle">Smart Home Device</text>
</svg>
