<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Background -->
  <rect width="400" height="400" fill="#f8fafc"/>
  
  <!-- Device body -->
  <rect x="120" y="80" width="160" height="200" rx="20" fill="#1e293b" stroke="#334155" stroke-width="4"/>
  <rect x="130" y="90" width="140" height="160" rx="10" fill="#0f172a"/>
  
  <!-- Screen content -->
  <circle cx="200" cy="150" r="30" fill="#3b82f6"/>
  <circle cx="200" cy="150" r="20" fill="#60a5fa"/>
  <rect x="165" y="195" width="70" height="8" rx="4" fill="#475569"/>
  <rect x="175" y="210" width="50" height="6" rx="3" fill="#64748b"/>
  
  <!-- LED indicators -->
  <circle cx="150" cy="265" r="4" fill="#10b981"/>
  <circle cx="200" cy="265" r="4" fill="#f59e0b"/>
  <circle cx="250" cy="265" r="4" fill="#ef4444"/>
  
  <!-- WiFi waves -->
  <path d="M200 40 Q200 20 210 10" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M190 45 Q190 25 200 15" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M210 45 Q210 25 200 15" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" fill="none"/>
  
  <!-- Brand text -->
  <text x="200" y="340" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1e293b" text-anchor="middle">Smart Hub</text>
  <text x="200" y="365" font-family="Arial, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Aqara M3</text>
</svg>
